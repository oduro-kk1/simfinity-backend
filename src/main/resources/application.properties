# Database (Railway injects these automatically when you add a Postgres service)
spring.datasource.url=jdbc:postgresql://containers-us-west-123.railway.app:5432/simfinitydb

spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Use Railway's dynamic port
server.port=${PORT:8080}

# Secrets from Railway environment
jwt.secret=${JWT_SECRET}
paystack.secret=${PAYSTACK_SECRET}
